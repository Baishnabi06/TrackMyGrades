<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placement Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full sm:max-w-xl md:max-w-2xl lg:max-w-3xl xl:max-w-4xl px-2 sm:px-8 md:px-16 py-8 sm:py-12 md:py-16 bg-white rounded-3xl shadow-2xl animate-fadeInScaleBlur relative min-h-[50vh] max-h-[90vh] overflow-auto transition-all duration-700">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Placement Predictor</h2>
      <a href="dashboard.html" class="text-blue-500 hover:text-blue-700 transition"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
    <form id="placementForm" class="space-y-4">
      <div>
        <label class="block text-gray-700">Enter CGPA</label>
        <input type="number" id="cgpaInput" min="0" max="10" step="0.01" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required />
      </div>
      <div>
        <label class="block text-gray-700">Any Backlogs?</label>
        <select id="backlogInput" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Predict</button>
      <div id="placementResult" class="mt-4 text-lg font-semibold text-center"></div>
      <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
        <div id="progressBar" class="bg-green-500 h-4 rounded-full transition-all duration-700" style="width:0%"></div>
      </div>
    </form>
  </div>
  <script src="../src/placement.js"></script>
</body>
</html>
