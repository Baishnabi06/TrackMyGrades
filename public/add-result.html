<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Result</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full sm:max-w-2xl md:max-w-3xl lg:max-w-5xl xl:max-w-7xl px-2 sm:px-8 md:px-16 py-8 sm:py-12 md:py-16 bg-white rounded-3xl shadow-2xl animate-fadeInScaleBlur relative min-h-[60vh] max-h-[90vh] overflow-auto transition-all duration-700">
    
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Add Result</h2>
      <a href="dashboard.html" class="text-blue-500 hover:text-blue-700 transition"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
    <form id="resultForm" class="space-y-4">
      <div>
        <label class="block text-gray-700">Semester Number</label>
        <input type="number" id="semester" min="1" max="12" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required />
      </div>
      <div id="subjectsContainer" class="space-y-2"></div>
      <button type="button" id="addSubjectBtn" class="py-1 px-3 bg-green-500 text-white rounded hover:bg-green-600 transition"><i class="fas fa-plus"></i> Add Subject</button>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Save Result</button>
      <div id="sgpaResult" class="mt-4 text-lg font-semibold text-center"></div>
    </form>
    
  </div>
  <script src="../src/add-result.js"></script>
</body>
</html>
