<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackMyGrades - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-bg min-h-screen flex items-center justify-center">
  <div class="w-full sm:max-w-xl md:max-w-2xl lg:max-w-3xl xl:max-w-4xl px-2 sm:px-8 md:px-16 py-8 sm:py-12 md:py-16 bg-white rounded-3xl shadow-2xl animate-fadeInScaleBlur relative min-h-[50vh] max-h-[90vh] overflow-auto transition-all duration-700">
  
    <div class="flex justify-center mb-6">
      <i class="fas fa-user-graduate text-4xl text-blue-600"></i>
    </div>
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Student Login</h2>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-700">Username</label>
        <input type="text" id="username" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required />
      </div>
      <div>
        <label class="block text-gray-700">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required />
      </div>
      <div id="loginError" class="text-red-500 text-sm hidden">Invalid username or password.</div>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Login</button>
    </form>
  </div>
  <script src="../src/login.js"></script>
</body>
</html>
